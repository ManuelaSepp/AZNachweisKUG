<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#70ad47">
  <title>AZNachweisKUG</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #25303b;
      background: #f4f6f8;
    }

    .app {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 14px;
    }

    .card {
      margin-bottom: 14px;
      padding: 22px 20px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(40,54,68,.11);
    }

    h1 {
      margin: 0 0 22px;
      text-align: center;
      font-size: 25px;
    }

    label {
      display: block;
      margin: 16px 0 7px;
      font-size: 16px;
      font-weight: 700;
    }

    input, select, button {
      width: 100%;
      min-height: 52px;
      padding: 12px 14px;
      border: 1px solid #d7dde3;
      border-radius: 12px;
      background: #fff;
      color: #25303b;
      font-size: 18px;
    }

    input:disabled, select:disabled {
      color: #929aa3;
      background: #f0f2f4;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 26px;
    }

    .button-row.edit-mode {
      grid-template-columns: 1fr 1fr;
    }

    .button-row button {
      margin: 0;
      border: 0;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    #saveButton,
    #updateButton {
      background: #70ad47;
    }

    #deleteButton {
      background: #c94c4c;
    }

    #cancelButton {
      background: #7b8794;
    }

    .secondary-row {
      display: none;
      grid-column: 1 / -1;
      grid-template-columns: 1fr;
    }

    .edit-mode .secondary-row {
      display: grid;
    }

    #meldung {
      min-height: 24px;
      margin-top: 15px;
      text-align: center;
      font-weight: 700;
    }

    .success { color: #337a19; }
    .error { color: #b42318; }

    .calendar-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .calendar-head button {
      width: 44px;
      min-height: 42px;
      padding: 0;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    #monthLabel {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      text-transform: capitalize;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-name {
      padding: 4px 0 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #667085;
    }

    .day-cell {
      min-height: 48px;
      padding: 6px 3px;
      border: 1px solid #dce2e7;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
    }

    .day-cell.empty { visibility: hidden; }

    .day-cell.today {
      box-shadow: inset 0 0 0 2px #4a90e2;
    }

    .day-cell.selected {
      outline: 3px solid #20252b;
      outline-offset: 1px;
      position: relative;
      z-index: 2;
    }

    .day-cell.today.selected {
      box-shadow: inset 0 0 0 2px #4a90e2;
      outline: 3px solid #20252b;
    }

    .day-number {
      display: block;
      font-weight: 700;
    }

    .status-label {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.05;
    }

    .status-offen {
      background: #f7f8fa;
      color: #667085;
    }

    .status-buero {
      background: #dceeff;
      color: #174f78;
    }

    .status-homeoffice {
      background: #efe2ff;
      color: #65418a;
    }

    .status-urlaub {
      background: #dff3d2;
      color: #35651c;
    }

    .status-krank {
      background: #ffdede;
      color: #8a2020;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 12px;
      font-size: 11px;
      text-align: center;
    }

    .legend span {
      padding: 6px 4px;
      border-radius: 8px;
      font-weight: 700;
    }


    .day-cell {
      position: relative;
    }

    .day-tooltip {
      position: fixed;
      z-index: 1000;
      min-width: 190px;
      max-width: 260px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #20252b;
      color: #ffffff;
      font-size: 13px;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.14s ease, transform 0.14s ease;
    }

    .day-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .day-tooltip strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .day-tooltip-line {
      display: block;
    }



    details.card {
      padding: 0;
      overflow: hidden;
    }

    details.card > summary {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 64px;
      padding: 18px 54px 18px 20px;
      list-style: none;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    details.card > summary::-webkit-details-marker {
      display: none;
    }

    details.card > summary::after {
      content: "⌄";
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-55%) rotate(0deg);
      font-size: 25px;
      line-height: 1;
      transition: transform 0.18s ease;
    }

    details.card[open] > summary::after {
      transform: translateY(-45%) rotate(180deg);
    }

    details.card > summary:focus-visible {
      outline: 3px solid rgba(112, 173, 71, 0.35);
      outline-offset: -3px;
    }

    .collapsible-content {
      padding: 0 20px 22px;
    }

    .collapsible-content .calendar-head {
      margin-top: 2px;
    }



    .selected-day-status {
      margin: 0 0 14px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #eef3f7;
      border: 1px solid #dce2e7;
      text-align: center;
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    .selected-day-status.status-neutral {
      background: #eef3f7;
      border-color: #dce2e7;
    }

    .selected-day-status.status-done {
      background: #e7f5df;
      border-color: #b8dca6;
    }

    .selected-day-status.status-urlaub {
      background: #dff3d2;
      border-color: #a9d28f;
    }

    .selected-day-status.status-krank {
      background: #fde3e3;
      border-color: #e7b4b4;
    }

    .selected-day-date {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: #25303b;
    }

    .selected-day-message {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .selected-day-message.open { color: #8a5a00; }
    .selected-day-message.done { color: #337a19; }
    .selected-day-message.urlaub { color: #35651c; }
    .selected-day-message.krank { color: #8a2020; }

    .year-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .year-head button {
      width: 44px;
      min-height: 42px;
      padding: 0;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    #yearLabel {
      flex: 1;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .month-card {
      min-height: 104px;
      padding: 10px;
      border: 1px solid #dce2e7;
      border-radius: 12px;
      background: #f8fafb;
      text-align: left;
      cursor: pointer;
      box-shadow: none;
    }

    .month-card:hover,
    .month-card:focus-visible {
      border-color: #70ad47;
      box-shadow: 0 0 0 3px rgba(112, 173, 71, 0.16);
      outline: none;
    }

    .month-card.current-month {
      border: 2px solid #4a90e2;
    }

    .month-name {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }

    .month-counts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
    }

    .month-count {
      padding: 5px 4px;
      border-radius: 7px;
      text-align: center;
    }

    .month-empty {
      display: block;
      padding-top: 16px;
      text-align: center;
      color: #8a949e;
      font-size: 12px;
    }

    .month-loading {
      display: block;
      padding-top: 16px;
      text-align: center;
      color: #667085;
      font-size: 12px;
    }

    @media (max-width: 420px) {
      .year-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stats-title {
      margin: 0 0 14px;
      font-size: 19px;
      text-align: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-card {
      padding: 12px;
      border-radius: 12px;
      background: #f7f8fa;
      text-align: center;
      border: 1px solid #e3e7eb;
    }

    .stat-value {
      display: block;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
    }

    .stat-label {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: #667085;
      font-weight: 700;
    }

    .stats-sums {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .stats-sums .stat-card {
      background: #eef3f7;
    }

    @media (max-width: 420px) {
      .app { padding: 8px; }
      .card { padding: 18px 14px; }
      .calendar-grid { gap: 4px; }
      .day-cell { min-height: 44px; padding: 5px 2px; }
    }
  </style>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#a8001f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KuG">
</head>

<body>
  <main class="app">
    <section class="card">
      <h1>Arbeitszeit erfassen</h1>

      <form id="entryForm" novalidate>
        <label for="datum">Datum</label>
        <input type="date" id="datum" required>

        <label for="arbeitsort">Arbeitsort</label>
        <select id="arbeitsort">
          <option value="">Bitte wählen</option>
          <option value="Büro">Büro</option>
          <option value="Homeoffice">Homeoffice</option>
        </select>

        <label for="taetigkeit">Tätigkeit</label>
        <select id="taetigkeit">
          <option value="">Bitte wählen</option>
        </select>

        <label for="stunden">Stunden</label>
        <input type="number" id="stunden" step="0.25" min="0.25" max="6" inputmode="decimal">

        <div class="row">
          <div>
            <label for="urlaub">Urlaub</label>
            <select id="urlaub">
              <option value="Nein">Nein</option>
              <option value="Ja">Ja</option>
            </select>
          </div>

          <div>
            <label for="krank">Krank</label>
            <select id="krank">
              <option value="Nein">Nein</option>
              <option value="Ja">Ja</option>
            </select>
          </div>
        </div>

        <div id="buttonRow" class="button-row">
          <button type="submit" id="saveButton">Speichern</button>
          <button type="button" id="updateButton" hidden>Ändern</button>
          <button type="button" id="deleteButton" hidden>Löschen</button>
          <div class="secondary-row">
            <button type="button" id="cancelButton">Bearbeitung abbrechen</button>
          </div>
        </div>

        <div id="meldung" aria-live="polite"></div>
      </form>
    </section>

<details class="card" open>
      <summary>Kalender</summary>

      <div class="collapsible-content">
        <div id="selectedDayStatus" class="selected-day-status">
          <span id="selectedDayDate" class="selected-day-date"></span>
          <span id="selectedDayMessage" class="selected-day-message"></span>
        </div>

        <div class="calendar-head">
          <button type="button" id="prevMonth" aria-label="Vorheriger Monat">‹</button>
          <div id="monthLabel"></div>
          <button type="button" id="nextMonth" aria-label="Nächster Monat">›</button>
        </div>

        <div id="calendarGrid" class="calendar-grid"></div>

        <div class="legend">
          <span class="status-buero">Büro</span>
          <span class="status-homeoffice">HO</span>
          <span class="status-urlaub">Urlaub</span>
          <span class="status-krank">Krank</span>
        </div>
      </div>
    </details>

    <details class="card" id="yearOverview">
      <summary id="yearSummary">Jahresübersicht 2026</summary>

      <div class="collapsible-content">
        <div class="year-head">
          <button type="button" id="prevYear" aria-label="Vorheriges Jahr">‹</button>
          <div id="yearLabel">2026</div>
          <button type="button" id="nextYear" aria-label="Nächstes Jahr">›</button>
        </div>

        <div id="yearGrid" class="year-grid"></div>
      </div>
    </details>

    <details class="card" open>
      <summary>Monatsübersicht</summary>

      <div class="collapsible-content">
        <div class="stats-grid">
          <div class="stat-card">
            <span id="statBuero" class="stat-value">0</span>
            <span class="stat-label">Bürotage</span>
          </div>

          <div class="stat-card">
            <span id="statHomeoffice" class="stat-value">0</span>
            <span class="stat-label">Homeoffice</span>
          </div>

          <div class="stat-card">
            <span id="statUrlaub" class="stat-value">0</span>
            <span class="stat-label">Urlaubstage</span>
          </div>

          <div class="stat-card">
            <span id="statKrank" class="stat-value">0</span>
            <span class="stat-label">Kranktage</span>
          </div>
        </div>

        <div class="stats-sums">
          <div class="stat-card">
            <span id="statArbeitsstunden" class="stat-value">0</span>
            <span class="stat-label">Arbeitsstunden</span>
          </div>

          <div class="stat-card">
            <span id="statKug" class="stat-value">0</span>
            <span class="stat-label">KUG-Stunden</span>
          </div>
        </div>
      </div>
    </details>
  </main>
  </main>
  </main>

  <div id="dayTooltip" class="day-tooltip" role="tooltip"></div>

  <script src="app.js?v=12"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js").catch(function (error) {
          console.error("Service Worker konnte nicht registriert werden:", error);
        });
      });
    }
  </script>
</body>
</html>
