<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#70ad47">
  <title>AZNachweisKUG</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #25303b;
      background: #f4f6f8;
    }

    .app {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 14px;
    }

    .card {
      padding: 22px 20px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(40, 54, 68, 0.11);
    }

    h1 {
      margin: 0 0 22px;
      text-align: center;
      font-size: 25px;
    }

    label {
      display: block;
      margin: 16px 0 7px;
      font-size: 16px;
      font-weight: 700;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 52px;
      padding: 12px 14px;
      border: 1px solid #d7dde3;
      border-radius: 12px;
      background: #ffffff;
      color: #25303b;
      font-size: 18px;
    }

    input:disabled,
    select:disabled {
      color: #929aa3;
      background: #f0f2f4;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      margin-top: 26px;
      border: 0;
      background: #70ad47;
      color: #ffffff;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    #meldung {
      min-height: 24px;
      margin-top: 15px;
      text-align: center;
      font-weight: 700;
    }

    .success { color: #337a19; }
    .error { color: #b42318; }
  </style>
</head>

<body>
  <main class="app">
    <section class="card">
      <h1>Arbeitszeit erfassen</h1>

      <form id="entryForm" novalidate>
        <label for="datum">Datum</label>
        <input type="date" id="datum" required>

        <label for="arbeitsort">Arbeitsort</label>
        <select id="arbeitsort">
          <option value="">Bitte wählen</option>
          <option value="Büro">Büro</option>
          <option value="Homeoffice">Homeoffice</option>
        </select>

        <label for="taetigkeit">Tätigkeit</label>
        <select id="taetigkeit">
          <option value="">Bitte wählen</option>
        </select>

        <label for="stunden">Stunden</label>
        <input type="number" id="stunden" step="0.25" min="0.25" max="6" inputmode="decimal">

        <div class="row">
          <div>
            <label for="urlaub">Urlaub</label>
            <select id="urlaub">
              <option value="Nein">Nein</option>
              <option value="Ja">Ja</option>
            </select>
          </div>

          <div>
            <label for="krank">Krank</label>
            <select id="krank">
              <option value="Nein">Nein</option>
              <option value="Ja">Ja</option>
            </select>
          </div>
        </div>

        <button type="submit" id="saveButton">Speichern</button>
        <div id="meldung" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="app.js?v=1"></script>
</body>
</html>
