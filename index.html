<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#70ad47">
  <title>AZNachweisKUG</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #25303b;
      background: #f4f6f8;
    }

    .app {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 14px;
    }

    .card {
      margin-bottom: 14px;
      padding: 22px 20px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(40, 54, 68, 0.11);
    }

    h1 {
      margin: 0 0 22px;
      text-align: center;
      font-size: 25px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
    }

    label {
      display: block;
      margin: 16px 0 7px;
      font-size: 16px;
      font-weight: 700;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 52px;
      padding: 12px 14px;
      border: 1px solid #d7dde3;
      border-radius: 12px;
      background: #ffffff;
      color: #25303b;
      font-size: 18px;
    }

    input:disabled,
    select:disabled {
      color: #929aa3;
      background: #f0f2f4;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #saveButton {
      margin-top: 26px;
      border: 0;
      background: #70ad47;
      color: #ffffff;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    #meldung {
      min-height: 24px;
      margin-top: 15px;
      text-align: center;
      font-weight: 700;
    }

    .success {
      color: #337a19;
    }

    .error {
      color: #b42318;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .calendar-head button {
      width: 44px;
      min-height: 42px;
      padding: 0;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    #monthLabel {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-name {
      padding: 4px 0 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #667085;
    }

    .day-cell {
      position: relative;
      min-height: 48px;
      padding: 6px 3px;
      border: 1px solid #dce2e7;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
    }

    .day-cell.empty {
      visibility: hidden;
    }

    .day-cell.today {
      outline: 2px solid #70ad47;
      outline-offset: 1px;
    }

    .day-number {
      display: block;
      font-weight: 700;
    }

    .status-label {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.05;
    }

    .status-offen {
      background: #f7f8fa;
      color: #667085;
    }

    .status-buero {
      background: #dceeff;
      color: #174f78;
    }

    .status-homeoffice {
      background: #efe2ff;
      color: #65418a;
    }

    .status-urlaub {
      background: #fff0c7;
      color: #765800;
    }

    .status-krank {
      background: #ffdede;
      color: #8a2020;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 12px;
      font-size: 11px;
      text-align: center;
    }

    .legend span {
      padding: 6px 4px;
      border-radius: 8px;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      .app {
        padding: 8px;
      }

      .card {
        padding: 18px 14px;
      }

      .calendar-grid {
        gap: 4px;
      }

      .day-cell {
        min-height: 44px;
        padding: 5px 2px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="card">
      <h1>Arbeitszeit erfassen</h1>

      <form id="entryForm" novalidate>
        <label for="datum">Datum</label>
        <input type="date" id="datum" required>

        <label for="arbeitsort">Arbeitsort</label>
        <select id="arbeitsort">
          <option value="">Bitte wählen</option>
          <option value="Büro">Büro</option>
          <option value="Homeoffice">Homeoffice</option>
        </select>

        <label for="taetigkeit">Tätigkeit</label>
        <select id="taetigkeit">
          <option value="">Bitte wählen</option>
        </select>

        <label for="stunden">Stunden</label>
        <input type="number" id="stunden" step="0.25" min="0.25" max="6" inputmode="decimal">

        <div class="row">
          <div>
            <label for="urlaub">Urlaub</label>
            <select id="urlaub">
              <option value="Nein">Nein</option>
              <option value="Ja">Ja</option>
            </select>
          </div>

          <div>
            <label for="krank">Krank</label>
            <select id="krank">
              <option value="Nein">Nein</option>
              <option value="Ja">Ja</option>
            </select>
          </div>
        </div>

        <button type="submit" id="saveButton">Speichern</button>
        <div id="meldung" aria-live="polite"></div>
      </form>
    </section>

    <section class="card">
      <div class="calendar-head">
        <button type="button" id="prevMonth" aria-label="Vorheriger Monat">‹</button>
        <div id="monthLabel"></div>
        <button type="button" id="nextMonth" aria-label="Nächster Monat">›</button>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>

      <div class="legend">
        <span class="status-buero">Büro</span>
        <span class="status-homeoffice">HO</span>
        <span class="status-urlaub">Urlaub</span>
        <span class="status-krank">Krank</span>
      </div>
    </section>
  </main>

  <script src="app.js?v=2"></script>
</body>
</html>
